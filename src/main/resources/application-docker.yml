spring:

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 6
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include:
          health,info,metrics
      base-path: /actuator

    endpoint:
      health:
        show-details: when-authorized
        show-components: when-authorized

    health:
      db:
        enabled: true
      diskspace: true
info:
  app:
    name: Secure Banking Api
    description: Banking Api
    version: 1.0.0
    environment: ${SPRING_PROFILES_ACTIVE:docker}

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
    default-models-expand-depth: 2
    default-models-rendering: model
  show-actuator: false
  packages-to-scan: com.SecureBankingApi.infrastructure.api

  paths-to-match: /api/**

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}