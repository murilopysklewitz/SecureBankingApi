services:



  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - secure_api_bank



  api:
    build: ./
    container_name: secure_api
    ports:
      - "3000:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    env_file:
      - SecureBankingApi/.env
    networks:
      - secure_api_bank
      -



networks:
  secure_api_bank:
    driver: bridge